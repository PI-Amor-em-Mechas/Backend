spring.application.name=api-para-formulario

# MySQL Connection
spring.datasource.url=jdbc:mysql://localhost:3306/amor_em_mechas?useSSL=false&serverTimezone=America/Sao_Paulo
spring.datasource.username=root
spring.datasource.password=SUA_SENHA_AQUI
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Server Configuration
server.port=8080

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Configuração do cookie de sessão
# HttpOnly: impede acesso via JavaScript (proteção contra XSS)
server.servlet.session.cookie.http-only=true
# Secure: false para testes em HTTP local (mude para true em produção HTTPS)
server.servlet.session.cookie.secure=false
# Nome do cookie de sessão
server.servlet.session.cookie.name=JSESSIONID
# Tempo de expiração da sessão (30 minutos)
server.servlet.session.timeout=30m

