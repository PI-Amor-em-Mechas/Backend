<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Janela de Reconhecimento</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
    <script src="{{ url_for('static', filename='socket.io.min.js') }}"></script>
  </head>
  <body class="recognition-body">
    <main class="recognition-page">
      <section class="video-panel">
        <header class="video-header">
          <h1>Reconhecimento em Tempo Real</h1>
          <p>Mantenha o rosto centralizado. A confirmacao de identidade aparece no canto inferior direito.</p>
        </header>

        <video id="cameraFeed" autoplay muted playsinline></video>
        <canvas id="captureCanvas" class="hidden"></canvas>

        <div id="statusBox" class="status overlay-status">Inicializando camera...</div>
      </section>
    </main>

    <aside id="identityToast" class="identity-toast hidden" aria-live="polite">
      <img id="identityPhoto" alt="Foto da pessoa reconhecida" />
      <div class="identity-content">
        <h2 id="identityName">-</h2>
        <p id="identityMeta">-</p>
        <p id="identityMessage" class="identity-message">-</p>
        <div id="confirmActions" class="actions hidden">
          <button id="confirmButton" class="btn success">Confirmar</button>
          <button id="cancelButton" class="btn danger">Cancelar</button>
        </div>
      </div>
    </aside>

    <section id="voicePanel" class="voice-panel hidden">
      <header class="voice-header">
        <h1>Comando de Voz</h1>
        <p id="voiceUserInfo">-</p>
        <p>Fale seu comando. Diga <strong>"salvar"</strong> ao final para gravar.</p>
      </header>

      <div class="voice-display">
        <div class="voice-block">
          <label>Texto acumulado:</label>
          <p id="voiceAccumulated" class="voice-text">-</p>
        </div>
        <div class="voice-block">
          <label>Reconhecendo agora:</label>
          <p id="voicePartial" class="voice-text partial">...</p>
        </div>
      </div>

      <div id="voiceStatus" class="status voice-status">Conectando...</div>

      <div class="voice-actions">
        <button id="forceSaveBtn" class="btn success">Salvar Agora</button>
        <input
          id="trainPhraseInput"
          type="text"
          placeholder="Frase para treinar (opcional)"
          class="voice-train-input"
        />
        <button id="trainVoiceBtn" class="btn secondary">Treinar Voz</button>
        <button id="voiceCloseBtn" class="btn danger">Fechar</button>
      </div>

      <div id="voiceHistory" class="voice-history hidden">
        <h3>Ultimos comandos salvos</h3>
        <ul id="voiceHistoryList"></ul>
      </div>
    </section>

    <script>
      const video = document.getElementById("cameraFeed");
      const canvas = document.getElementById("captureCanvas");
      const statusBox = document.getElementById("statusBox");
      const identityToast = document.getElementById("identityToast");
      const identityPhoto = document.getElementById("identityPhoto");
      const identityName = document.getElementById("identityName");
      const identityMeta = document.getElementById("identityMeta");
      const identityMessage = document.getElementById("identityMessage");
      const confirmActions = document.getElementById("confirmActions");
      const confirmButton = document.getElementById("confirmButton");
      const cancelButton = document.getElementById("cancelButton");

      let recognitionTimer = null;
      let requestInFlight = false;
      let pendingToken = null;
      let trainingInProgress = false;

      function setStatus(message, type) {
        statusBox.textContent = message;
        statusBox.className = "status overlay-status " + (type || "");
      }

      function showIdentity(data, withActions) {
        identityPhoto.src = data.image || "";
        identityName.textContent = data.name || "Nao reconhecido";
        identityMeta.textContent = data.employee_id
          ? `ID: ${data.employee_id} | Confianca: ${Number(data.confidence || 0).toFixed(1)}`
          : data.confidence !== undefined
          ? `Confianca: ${Number(data.confidence || 0).toFixed(1)}`
          : "";
        identityMessage.textContent = data.message || "";

        if (withActions) {
          confirmActions.classList.remove("hidden");
        } else {
          confirmActions.classList.add("hidden");
        }

        identityToast.classList.remove("hidden");
      }

      function hideIdentity() {
        identityToast.classList.add("hidden");
        confirmActions.classList.add("hidden");
      }

      function pauseRecognition() {
        if (recognitionTimer) {
          window.clearInterval(recognitionTimer);
          recognitionTimer = null;
        }
      }

      function resumeRecognition() {
        if (!recognitionTimer) {
          recognitionTimer = window.setInterval(recognizeFrame, 1200);
        }
      }

      async function initCamera() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: {
              width: { ideal: 1920 },
              height: { ideal: 1080 },
              frameRate: { ideal: 30 },
            },
            audio: false,
          });
          video.srcObject = stream;
          await video.play();
          setStatus("Camera pronta. Aguardando reconhecimento...", "success");
          resumeRecognition();
        } catch (error) {
          setStatus("Nao foi possivel acessar a camera: " + error.message, "error");
        }
      }

      async function retrainAndRestartRecognition() {
        if (trainingInProgress) {
          return;
        }

        trainingInProgress = true;
        pauseRecognition();
        hideIdentity();
        setStatus("Pessoa nao reconhecida. Treinando modelo e reiniciando reconhecimento...", "warning");

        try {
          const response = await fetch("/train-model", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({}),
          });
          const data = await response.json();

          if (data.status === "trained") {
            setStatus("Treino concluido. Reconhecimento retomado.", "success");
          } else {
            setStatus(data.message || "Treino finalizado com aviso.", "warning");
          }
        } catch (error) {
          setStatus("Erro ao treinar modelo: " + error.message, "error");
        } finally {
          trainingInProgress = false;
          pendingToken = null;
          resumeRecognition();
        }
      }

      function captureFrame() {
        const width = video.videoWidth;
        const height = video.videoHeight;

        if (!width || !height) {
          return null;
        }

        canvas.width = width;
        canvas.height = height;

        const ctx = canvas.getContext("2d", { willReadFrequently: false });
        ctx.drawImage(video, 0, 0, width, height);
        return canvas.toDataURL("image/jpeg", 0.95);
      }

      async function recognizeFrame() {
        if (requestInFlight || pendingToken || trainingInProgress) {
          return;
        }

        const image = captureFrame();
        if (!image) {
          return;
        }

        requestInFlight = true;

        try {
          const response = await fetch("/recognize-frame", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ image }),
          });
          const data = await response.json();

          if (data.status === "recognized") {
            pendingToken = data.token;
            showIdentity(data, true);
            setStatus("Pessoa reconhecida. Confirme para registrar.", "success");
            return;
          }

          if (data.status === "cooldown") {
            showIdentity(data, false);
            setStatus(data.message, "warning");
            return;
          }

          if (data.status === "unknown") {
            await retrainAndRestartRecognition();
            return;
          }

          if (data.status === "no_face") {
            hideIdentity();
            setStatus("Nenhuma face detectada no quadro atual.", "info");
            return;
          }

          setStatus(data.message || "Falha no reconhecimento.", "error");
        } catch (error) {
          setStatus("Erro no reconhecimento: " + error.message, "error");
        } finally {
          requestInFlight = false;
        }
      }

      async function sendConfirmation(confirm) {
        if (!pendingToken) {
          return;
        }

        confirmButton.disabled = true;
        cancelButton.disabled = true;

        try {
          const response = await fetch("/confirm", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token: pendingToken, confirm }),
          });
          const data = await response.json();

          if (data.status === "saved") {
            setStatus(`${data.message} Tipo: ${data.punch_type}.`, "success");
            if (confirm && data.voice_token) {
              startVoiceMode(data.voice_token, data.employee_id, data.name);
              return;
            }
          } else {
            setStatus(data.message || "Operacao concluida.", "warning");
          }

          pendingToken = null;
          hideIdentity();
        } catch (error) {
          setStatus("Erro ao confirmar: " + error.message, "error");
        } finally {
          confirmButton.disabled = false;
          cancelButton.disabled = false;
        }
      }

      confirmButton.addEventListener("click", () => sendConfirmation(true));
      cancelButton.addEventListener("click", () => sendConfirmation(false));

      window.addEventListener("beforeunload", () => {
        pauseRecognition();
        stopVoiceMode();

        if (video.srcObject) {
          video.srcObject.getTracks().forEach((track) => track.stop());
        }
      });

      // ===== Voice Mode =====
      let voiceToken = null;
      let socket = null;
      let audioContext = null;
      let micStream = null;

      function startVoiceMode(token, employeeId, employeeName) {
        // Garante que nao exista conexao anterior pendurada.
        stopVoiceMode();
        voiceToken = token;

        // Parar camera e reconhecimento facial
        pauseRecognition();
        if (video.srcObject) {
          video.srcObject.getTracks().forEach((t) => t.stop());
        }

        // Alternar paineis
        document.querySelector(".video-panel").classList.add("hidden");
        identityToast.classList.add("hidden");
        document.getElementById("voicePanel").classList.remove("hidden");

        document.getElementById("voiceUserInfo").textContent =
          `Usuario: ${employeeName} (ID: ${employeeId})`;

        const voiceStatus = document.getElementById("voiceStatus");
        voiceStatus.textContent = "Conectando ao servidor de voz...";
        voiceStatus.className = "status voice-status";

        // Conectar SocketIO — preferir websocket para streaming de audio estavel
        socket = io({
          transports: ["websocket"],
          upgrade: false,
          forceNew: true,
          autoConnect: false,
          reconnection: true,
          reconnectionAttempts: 5,
          reconnectionDelay: 1000,
          timeout: 20000,
        });

        socket.connect();

        socket.on("connect", () => {
          socket.emit("voice_auth", { token: voiceToken });
        });

        socket.on("connect_error", (err) => {
          console.error("Socket.IO connect_error:", err);
          voiceStatus.textContent = "Erro de conexao: " + err.message;
          voiceStatus.className = "status voice-status error";
        });

        socket.on("voice_ready", (data) => {
          const phrases = Number(data?.phrases || 0);
          voiceStatus.textContent = `Microfone ativo. Fale agora. Frases treinadas: ${phrases}.`;
          voiceStatus.className = "status voice-status success";
          startMicrophone();
        });

        socket.on("voice_partial", (data) => {
          document.getElementById("voiceAccumulated").textContent =
            data.accumulated || "-";
          document.getElementById("voicePartial").textContent =
            data.partial || "...";
        });

        socket.on("voice_saved", (data) => {
          document.getElementById("voiceAccumulated").textContent = "-";
          document.getElementById("voicePartial").textContent = "...";
          voiceStatus.textContent = `Salvo: "${data.text}"`;
          voiceStatus.className = "status voice-status success";
          addToHistory(data.text);
        });

        socket.on("voice_trained", (data) => {
          const total = Number(data?.phrases || 0);
          voiceStatus.textContent = `Treino atualizado: "${data.phrase}". Total de frases: ${total}.`;
          voiceStatus.className = "status voice-status success";
          document.getElementById("trainPhraseInput").value = "";
        });

        socket.on("voice_error", (data) => {
          voiceStatus.textContent = data.message;
          voiceStatus.className = "status voice-status error";
        });

        socket.on("disconnect", () => {
          voiceStatus.textContent = "Desconectado do servidor.";
          voiceStatus.className = "status voice-status warning";
        });
      }

      async function startMicrophone() {
        try {
          audioContext = new AudioContext({ sampleRate: 16000 });

          // Garantir que o AudioContext nao esta suspenso (politica de autoplay do browser)
          if (audioContext.state === "suspended") {
            await audioContext.resume();
          }

          micStream = await navigator.mediaDevices.getUserMedia({
            audio: {
              channelCount: 1,
              sampleRate: { ideal: 16000 },
              echoCancellation: true,
              noiseSuppression: true,
            },
            video: false,
          });

          const source = audioContext.createMediaStreamSource(micStream);

          await audioContext.audioWorklet.addModule(
            "/static/audio-processor.js"
          );
          const processor = new AudioWorkletNode(
            audioContext,
            "pcm16-processor"
          );

          processor.port.onmessage = (event) => {
            if (socket && socket.connected) {
              socket.emit("audio_chunk", event.data);
            }
          };

          source.connect(processor);
          // Nao conectar ao destination (nao reproduzir audio)
        } catch (error) {
          const voiceStatus = document.getElementById("voiceStatus");
          voiceStatus.textContent =
            "Erro ao acessar microfone: " + error.message;
          voiceStatus.className = "status voice-status error";
        }
      }

      function stopVoiceMode() {
        if (micStream) {
          micStream.getTracks().forEach((t) => t.stop());
          micStream = null;
        }
        if (audioContext) {
          audioContext.close();
          audioContext = null;
        }
        if (socket) {
          socket.disconnect();
          socket = null;
        }
      }

      function addToHistory(text) {
        const historyDiv = document.getElementById("voiceHistory");
        const list = document.getElementById("voiceHistoryList");
        historyDiv.classList.remove("hidden");
        const li = document.createElement("li");
        li.textContent = text;
        list.prepend(li);
      }

      document
        .getElementById("forceSaveBtn")
        .addEventListener("click", () => {
          if (socket && socket.connected) {
            socket.emit("force_save");
          }
        });

      document
        .getElementById("trainVoiceBtn")
        .addEventListener("click", () => {
          if (!(socket && socket.connected)) {
            return;
          }
          const phrase = document.getElementById("trainPhraseInput").value;
          socket.emit("voice_train", { phrase });
        });

      document
        .getElementById("voiceCloseBtn")
        .addEventListener("click", () => {
          stopVoiceMode();
          window.close();
        });

      initCamera();
    </script>
  </body>
</html>
